name: Poll Jira

on:
  schedule:
    # Every 15 minutes, Mon-Fri, during work hours (8 AM - 20 PM ART = 11-23 UTC)
    - cron: "*/15 11-23 * * 1-5"

  # Manual trigger for testing
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --production --registry https://registry.npmjs.org

      - name: Poll Jira and process updates
        env:
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          PM_CALENDAR_ID: ${{ secrets.PM_CALENDAR_ID }}
          SLACK_USER_TOKEN: ${{ secrets.SLACK_USER_TOKEN }}
          SLACK_PM_EMAIL: ${{ secrets.SLACK_PM_EMAIL }}
          SLACK_PM_USER_ID: ${{ secrets.SLACK_PM_USER_ID }}
          SLACK_CC_EMAIL: ${{ secrets.SLACK_CC_EMAIL }}
          SLACK_CC_USER_ID: ${{ secrets.SLACK_CC_USER_ID }}
          PM_CALENDAR_EMAIL: ${{ secrets.PM_CALENDAR_EMAIL }}
          CC_CALENDAR_EMAIL: ${{ secrets.CC_CALENDAR_EMAIL }}
        run: node src/poll-jira.js

      - name: Commit state changes
        run: |
          git config user.name "deploy-tracker-bot"
          git config user.email "bot@deploy-tracker.local"
          git add data/
          git diff --staged --quiet || git commit -m "🤖 Update deploy queue [skip ci]"
          git push
