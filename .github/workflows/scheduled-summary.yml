name: Scheduled Summary

on:
  schedule:
    # Horarios pensados para la rutina del PM:
    # 9:15 ART — 15 min antes de la daily (para que llegue leído)
    # 13:00 ART — después del almuerzo, antes del bloque de la tarde
    # 15:00 ART — última revisión antes del cierre
    - cron: "15 12 * * 1-5"  # 9:15 ART Lun-Vie (pre-daily)
    - cron: "0 16 * * 1-5"   # 13:00 ART
    - cron: "0 18 * * 1-5"   # 15:00 ART
  
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  summary:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --production

      - name: Generate and send summary
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_USER_TOKEN: ${{ secrets.SLACK_USER_TOKEN }}
          SLACK_PM_EMAIL: ${{ secrets.SLACK_PM_EMAIL }}
          SLACK_PM_USER_ID: ${{ secrets.SLACK_PM_USER_ID }}
        run: node src/generate-summary.js
