name: Scheduled Summary

on:
  schedule:
    # 9:15 ART — 15 min antes de la daily
    # 14:00 ART — después del almuerzo
    - cron: "15 12 * * 1-5"  # 9:15 ART Lun-Vie
    - cron: "0 17 * * 1-5"   # 14:00 ART
  
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  summary:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --production --registry https://registry.npmjs.org

      - name: Generate and send summary
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_USER_TOKEN: ${{ secrets.SLACK_USER_TOKEN }}
          SLACK_PM_EMAIL: ${{ secrets.SLACK_PM_EMAIL }}
          SLACK_PM_USER_ID: ${{ secrets.SLACK_PM_USER_ID }}
          SLACK_CC_EMAIL: ${{ secrets.SLACK_CC_EMAIL }}
          SLACK_CC_USER_ID: ${{ secrets.SLACK_CC_USER_ID }}
        run: node src/generate-summary.js
