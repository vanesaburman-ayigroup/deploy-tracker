name: Process Jira Webhook

on:
  repository_dispatch:
    types: [jira_webhook]

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --production

      - name: Process webhook
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          PM_CALENDAR_ID: ${{ secrets.PM_CALENDAR_ID }}
          JIRA_PAYLOAD: ${{ toJson(github.event.client_payload) }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_USER_TOKEN: ${{ secrets.SLACK_USER_TOKEN }}
          SLACK_PM_EMAIL: ${{ secrets.SLACK_PM_EMAIL }}
          SLACK_PM_USER_ID: ${{ secrets.SLACK_PM_USER_ID }}
        run: node src/process-webhook.js

      - name: Commit state changes
        run: |
          git config user.name "deploy-tracker-bot"
          git config user.email "bot@deploy-tracker.local"
          git add data/
          git diff --staged --quiet || git commit -m "🤖 Update deploy queue [skip ci]"
          git push
